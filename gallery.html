<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Sarah Ibsen</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            background-color: #ffffff; 
            margin: 0;
            font-family: 'Helvetica', 'Arial', sans-serif; 
        }

        .gallery-container {
            max-width: 1100px;
            margin: 100px auto;
            padding: 0 20px;
            text-align: center;
        }

        .gallery-header {
            margin-bottom: 50px;
        }

        .gallery-header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .iframe-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 75%; /* Aspect Ratio 4:3 */
            border: 1px solid #eee; /* Subtle border */
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .gallery-container { margin: 60px auto; }
        }
    </style>
</head>
<body>

    <nav style="text-align: center; padding: 40px 0;">
        <a href="index.html" style="margin: 0 15px; text-decoration: none; color: #000; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">Home</a>
        <a href="gallery.html" style="margin: 0 15px; text-decoration: none; color: #000; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; border-bottom: 1px solid #000;">Gallery</a>
        <a href="about.html" style="margin: 0 15px; text-decoration: none; color: #000; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;">About</a>
    </nav>

    <div class="gallery-container">
        <div class="gallery-header">
            <h1>Photo Gallery</h1>
            <p style="font-style: italic; color: #666;">A live look at my recent work</p>
        </div>

        <div class="iframe-wrapper">
           
        <iframe src="https://drive.google.com/embeddedfolderview?id=1N-96b5A1t1sOm1jg95pnZH6aS1qsJ0bE#grid" style="width:100%; height:600px; border:0;"></iframe> 

        </div>
    </div>

    <footer style="text-align: center; padding: 80px 0; font-size: 10px; color: #999; letter-spacing: 1px;">
        &copy; SARAH IBSEN 2026
    </footer>

</body>
</html>
